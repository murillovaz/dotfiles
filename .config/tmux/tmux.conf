# ── Prefix ──────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── nvim-friendly essentials ────────────────────────────────────────
set -sg escape-time 0          # no Esc lag inside nvim
set -g focus-events on         # gitsigns / :autoread react to focus
set -g mouse on
set -g history-limit 50000
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1      # panes start at 1
set -g renumber-windows on     # keep window numbers gap-free
setw -g mode-keys vi           # vi keys in copy mode
set -sg repeat-time 300

# ── True color (so nvim's base16 theme renders correctly) ───────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc,*:RGB"

# ── Seamless nvim <-> tmux pane navigation (vim-tmux-navigator) ──────
# Ctrl+hjkl: if the pane runs a vim-like process, forward the key to it;
# otherwise switch tmux panes. Pairs with christoomey/vim-tmux-navigator.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# C-l is now navigation, so reclaim "clear screen" under the prefix
bind C-l send-keys 'C-l'

# ── Quality-of-life binds ───────────────────────────────────────────
# Split panes in the current directory (defaults " and % still work too)
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"
